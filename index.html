<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pizzas do lucas</title>
    <style>
        /* Estilo para centralizar e colocar o fundo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fce4bd; /* Cor de fundo (amarelado) */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #container-vendas {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        h2 { color: #d35400; margin-bottom: 20px; }

        label { display: block; margin-top: 15px; font-weight: bold; color: #444; }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Garante que não passe da largura */
        }

        button {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s;
        }

        button:hover { background-color: #128c7e; }

        #agradecimento { display: none; }
    </style>
</head>
<body>

    <div id="container-vendas">
        <!-- Parte do Formulário -->
        <div id="interface-pedido">
            <h2>pizzas do lucas</h2>
            
            <label>Quantidade de pizzas:</label>
            <input type="number" id="quantidade" value="1" min="1">

            <label>Adicionar Catupiry?</label>
            <select id="catupiry">
                <option value="Sem Catupiry">Não</option>
                <option value="Com Catupiry">Sim (+ Adicional)</option>
            </select>

            <button onclick="enviarWhatsapp()">🚀 Pedir no WhatsApp</button>
        </div>

        <!-- Parte do Agradecimento -->
        <div id="agradecimento">
            <h2 style="color: #27ae60;">✅ Pedido Enviado!</h2>
            <p>Muito obrigado por escolher a <strong>A pizzaria do lucas</strong>!</p>
        </div>
    </div>

    <script>
    function enviarWhatsapp() {
        const qtd = document.getElementById('quantidade').value;
        const catupiry = document.getElementById('catupiry').value;
        const numero = "5521999512027";
        
        const mensagem = `Olá! Gostaria de fazer um pedido na Pizzaria do lucas:%0A- Quantidade: ${qtd}%0A- Opção: ${catupiry}`;
        
        window.open(`https://wa.me{numero}?text=${mensagem}`, '_blank');

        // Esconde o formulário e mostra o agradecimento
        document.getElementById('interface-pedido').style.display = 'none';
        document.getElementById('agradecimento').style.display = 'block';
    }
    </script>

</body>
</html>
